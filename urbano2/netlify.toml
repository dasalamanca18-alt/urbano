[build]
  publish = "site"
  functions = "netlify/functions"

# --- Productos ---
[[redirects]]
  from = "/api/urbano/productos"
  to = "/.netlify/functions/productos"
  status = 200

[[redirects]]
  from = "/api/urbano/productos/*"
  to = "/.netlify/functions/productos/:splat"
  status = 200

# --- Imágenes ---
[[redirects]]
  from = "/api/urbano/imagenes"
  to = "/.netlify/functions/imagenes"
  status = 200

[[redirects]]
  from = "/api/urbano/imagenes/*"
  to = "/.netlify/functions/imagenes/:splat"
  status = 200

# --- Categorías ---
[[redirects]]
  from = "/api/urbano/categorias"
  to = "/.netlify/functions/categorias"
  status = 200

[[redirects]]
  from = "/api/urbano/categorias/*"
  to = "/.netlify/functions/categorias/:splat"
  status = 200

# --- Diseño (zonas editables de la página) ---
[[redirects]]
  from = "/api/urbano/diseno"
  to = "/.netlify/functions/diseno"
  status = 200
