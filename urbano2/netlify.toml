[build]
  publish = "site"
  functions = "netlify/functions"

# Permite llamar a la función como /api/urbano/productos
# en vez de la ruta larga /.netlify/functions/productos
[[redirects]]
  from = "/api/urbano/productos"
  to = "/.netlify/functions/productos"
  status = 200

[[redirects]]
  from = "/api/urbano/productos/*"
  to = "/.netlify/functions/productos/:splat"
  status = 200
